<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AIML Quest — Interactive Visual Learning</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="logo"><canvas id="logoCanvas" width="36" height="36"></canvas></div>
          <div>
            <div class="brandName">AIML Quest</div>
            <div class="brandTag">See it. Touch it. Learn it.</div>
          </div>
        </div>
        <div class="topActions">
          <span id="userChip" class="chip hidden"></span>
          <button id="btnDemo" class="btn ghost" type="button">⭐ Demo</button>
          <button id="btnLogout" class="btn ghost hidden" type="button">Logout</button>
        </div>
      </header>

      <!-- AUTH -->
      <section id="authView" class="authWrap">
        <div class="authCard glass">
          <h1>Welcome to AIML Quest</h1>
          <p class="sub">Learn AI/ML visually — watch neurons fire, drag weights, grow decision trees.</p>
          <div class="tabRow">
            <button id="tabLogin" class="tabBtn active" type="button">Login</button>
            <button id="tabReg" class="tabBtn" type="button">Register</button>
          </div>
          <form id="authForm">
            <label><span>Email</span><input id="inEmail" type="email" required placeholder="you@example.com" autocomplete="email" /></label>
            <label><span>Password</span><input id="inPw" type="password" required placeholder="••••••••" autocomplete="current-password" /></label>
            <button id="authBtn" class="btn primary" type="submit">Login</button>
            <div id="authErr" class="errBox hidden"></div>
          </form>
          <div class="authDivider"><span>or</span></div>
          <button id="btnGoogle" class="btn googleBtn" type="button">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.0 24.0 0 0 0 0 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Continue with Google
          </button>
        </div>
      </section>

      <!-- ONBOARDING -->
      <section id="onboardView" class="authWrap hidden">
        <div class="onboardCard" id="onboardInner"></div>
      </section>

      <!-- APP -->
      <section id="appView" class="appWrap hidden">
        <aside class="sidebar">
          <nav id="mainNav" class="navList">
            <button class="navBtn active" data-r="dashboard" type="button">Dashboard</button>
            <button class="navBtn" data-r="progress" type="button">Progress</button>
            <button class="navBtn" data-r="learn" type="button">Learn</button>
            <button class="navBtn" data-r="playground" type="button">Playground</button>
            <button class="navBtn" data-r="games" type="button">Games</button>
            <button class="navBtn" data-r="quiz" type="button">Quiz</button>
            <button class="navBtn" data-r="simulate" type="button">Simulation</button>
            <button class="navBtn" data-r="leaderboard" type="button">Leaderboard</button>
          </nav>
          <div class="sideInfo">
            <div class="sideInfoTitle">How to learn here</div>
            <div class="sub">Pick a topic. Drag sliders. Play games. Watch the math happen live.</div>
          </div>
        </aside>
        <main class="content">
          <div id="v_dashboard" class="view"></div>
          <div id="v_progress" class="view hidden"></div>
          <div id="v_learn" class="view hidden"></div>
          <div id="v_learnTopic" class="view hidden"></div>
          <div id="v_lesson" class="view hidden"></div>
          <div id="v_perceptron" class="view hidden"></div>
          <div id="v_nn" class="view hidden"></div>
          <div id="v_dtree" class="view hidden"></div>
          <div id="v_knn" class="view hidden"></div>
          <div id="v_linreg" class="view hidden"></div>
          <div id="v_playground" class="view hidden"></div>
          <div id="v_games" class="view hidden"></div>
          <div id="v_game" class="view hidden"></div>
          <div id="v_quiz" class="view hidden"></div>
          <div id="v_simulate" class="view hidden"></div>
          <div id="v_simulation" class="view hidden"></div>
          <div id="v_leaderboard" class="view hidden"></div>
        </main>
      </section>

      <div id="tooltip" class="tooltip hidden"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
